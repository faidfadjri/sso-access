version: '3.8'

services:
  app:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      # Database Connection (Connect to Host MySQL)
      # These override values in .env; host.docker.internal is needed for container -> host connection
      - DB_HOST=host.docker.internal
      
      # Redis Connection (Connect to Redis Container)
      - REDIS_ADDR=redis:6379

      # Ensure timezone is set if not in .env
      - TZ=Asia/Jakarta

    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway" # Required for Linux/some environments to access host

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data # Persistence for Redis

volumes:
  redis_data:
